<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order WebSocket Test Client</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
        }

        .connection-panel {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        input[type="text"] {
            flex: 1;
            min-width: 300px;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s;
        }

        .btn-connect {
            background: #4CAF50;
            color: white;
        }

        .btn-connect:hover {
            background: #45a049;
        }

        .btn-disconnect {
            background: #f44336;
            color: white;
        }

        .btn-disconnect:hover {
            background: #da190b;
        }

        .btn-clear {
            background: #ff9800;
            color: white;
        }

        .btn-clear:hover {
            background: #e68900;
        }

        .status {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        .status.connected {
            background: #4CAF50;
            color: white;
        }

        .status.disconnected {
            background: #f44336;
            color: white;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .panel {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .panel h2 {
            color: #333;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }

        .messages {
            height: 500px;
            overflow-y: auto;
            border: 1px solid #ddd;
            border-radius: 5px;
            padding: 10px;
            background: #f9f9f9;
        }

        .message {
            margin-bottom: 10px;
            padding: 10px;
            border-radius: 5px;
            animation: slideIn 0.3s;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.created {
            background: #e8f5e9;
            border-left: 4px solid #4CAF50;
        }

        .message.updated {
            background: #fff3e0;
            border-left: 4px solid #ff9800;
        }

        .message.deleted {
            background: #ffebee;
            border-left: 4px solid #f44336;
        }

        .message-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .message-action {
            text-transform: uppercase;
            font-size: 12px;
        }

        .message-time {
            color: #666;
            font-size: 12px;
        }

        .message-body {
            font-size: 14px;
            color: #333;
        }

        .order-card {
            background: white;
            border: 1px solid #ddd;
            border-radius: 5px;
            padding: 15px;
            margin-bottom: 10px;
            transition: all 0.3s;
        }

        .order-card:hover {
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .order-id {
            font-weight: bold;
            color: #667eea;
        }

        .order-status {
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;
        }

        .order-status.PENDING { background: #fff3cd; color: #856404; }
        .order-status.CONFIRMED { background: #d1ecf1; color: #0c5460; }
        .order-status.PREPARING { background: #cce5ff; color: #004085; }
        .order-status.READY { background: #d4edda; color: #155724; }
        .order-status.COMPLETED { background: #d4edda; color: #155724; }
        .order-status.CANCELLED { background: #f8d7da; color: #721c24; }

        .order-info {
            font-size: 13px;
            color: #666;
            margin-bottom: 5px;
        }

        .order-items {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #eee;
        }

        .order-item {
            font-size: 12px;
            color: #333;
            margin-bottom: 3px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-value {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 12px;
            opacity: 0.9;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔌 Order WebSocket Test Client</h1>
            <div class="connection-panel">
                <input type="text" id="tokenInput" placeholder="Enter JWT Token" />
                <button class="btn-connect" onclick="connect()">Connect</button>
                <button class="btn-disconnect" onclick="disconnect()">Disconnect</button>
                <button class="btn-clear" onclick="clearMessages()">Clear Messages</button>
                <span class="status disconnected" id="status">Disconnected</span>
            </div>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-value" id="totalOrders">0</div>
                <div class="stat-label">Total Orders</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="messagesReceived">0</div>
                <div class="stat-label">Messages Received</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="connectionTime">00:00</div>
                <div class="stat-label">Connected Time</div>
            </div>
        </div>

        <div class="main-content">
            <div class="panel">
                <h2>📨 Messages Log</h2>
                <div class="messages" id="messages"></div>
            </div>

            <div class="panel">
                <h2>📋 Active Orders</h2>
                <div class="messages" id="orders"></div>
            </div>
        </div>
    </div>

    <script>
        let ws = null;
        let orders = new Map();
        let messageCount = 0;
        let connectionStartTime = null;
        let connectionTimer = null;

        function connect() {
            const token = document.getElementById('tokenInput').value.trim();
            if (!token) {
                alert('Please enter JWT token');
                return;
            }

            if (ws) {
                ws.close();
            }

            const wsUrl = `ws://localhost:8080/api/v1/ws/orders?token=${token}`;
            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                updateStatus('connected');
                addMessage('System', 'Connected to WebSocket', 'info');
                connectionStartTime = Date.now();
                startConnectionTimer();
            };

            ws.onmessage = (event) => {
                const message = JSON.parse(event.data);
                handleMessage(message);
            };

            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
                addMessage('Error', 'Connection error occurred', 'error');
            };

            ws.onclose = () => {
                updateStatus('disconnected');
                addMessage('System', 'Disconnected from WebSocket', 'info');
                stopConnectionTimer();
            };
        }

        function disconnect() {
            if (ws) {
                ws.close();
                ws = null;
            }
        }

        function handleMessage(message) {
            messageCount++;
            document.getElementById('messagesReceived').textContent = messageCount;

            if (message.type === 'order') {
                const action = message.action;
                const data = message.data;

                addMessage(
                    action.toUpperCase(),
                    formatOrderMessage(action, data),
                    action
                );

                if (action === 'created' || action === 'updated') {
                    orders.set(data.id, data);
                    playNotificationSound();
                } else if (action === 'deleted') {
                    orders.delete(data.id);
                }

                updateOrdersList();
                updateTotalOrders();
            }
        }

        function formatOrderMessage(action, data) {
            if (action === 'deleted') {
                return `Order ${data.id.substring(0, 8)} deleted`;
            }
            return `
                <strong>Order ID:</strong> ${data.id.substring(0, 8)}...<br>
                <strong>Table:</strong> ${data.table_number} | 
                <strong>Status:</strong> ${data.status} | 
                <strong>Total:</strong> Rp ${data.total_amount.toLocaleString()}<br>
                <strong>Items:</strong> ${data.order_items.length} item(s)
            `;
        }

        function addMessage(action, content, type) {
            const messagesDiv = document.getElementById('messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            
            const now = new Date();
            const time = now.toLocaleTimeString();

            messageDiv.innerHTML = `
                <div class="message-header">
                    <span class="message-action">${action}</span>
                    <span class="message-time">${time}</span>
                </div>
                <div class="message-body">${content}</div>
            `;

            messagesDiv.insertBefore(messageDiv, messagesDiv.firstChild);

            // Keep only last 50 messages
            while (messagesDiv.children.length > 50) {
                messagesDiv.removeChild(messagesDiv.lastChild);
            }
        }

        function updateOrdersList() {
            const ordersDiv = document.getElementById('orders');
            ordersDiv.innerHTML = '';

            const sortedOrders = Array.from(orders.values())
                .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

            sortedOrders.forEach(order => {
                const orderCard = document.createElement('div');
                orderCard.className = 'order-card';
                orderCard.innerHTML = `
                    <div class="order-header">
                        <span class="order-id">#${order.id.substring(0, 8)}</span>
                        <span class="order-status ${order.status}">${order.status}</span>
                    </div>
                    <div class="order-info">
                        <strong>Table:</strong> ${order.table_number} | 
                        <strong>Method:</strong> ${order.order_method}
                    </div>
                    ${order.customer_name ? `<div class="order-info"><strong>Customer:</strong> ${order.customer_name}</div>` : ''}
                    <div class="order-info">
                        <strong>Total:</strong> Rp ${order.total_amount.toLocaleString()}
                    </div>
                    <div class="order-items">
                        ${order.order_items.map(item => `
                            <div class="order-item">
                                • ${item.quantity}x ${item.product_name} - Rp ${item.subtotal.toLocaleString()}
                            </div>
                        `).join('')}
                    </div>
                `;
                ordersDiv.appendChild(orderCard);
            });
        }

        function updateTotalOrders() {
            document.getElementById('totalOrders').textContent = orders.size;
        }

        function updateStatus(status) {
            const statusEl = document.getElementById('status');
            statusEl.className = `status ${status}`;
            statusEl.textContent = status === 'connected' ? 'Connected' : 'Disconnected';
        }

        function clearMessages() {
            document.getElementById('messages').innerHTML = '';
            messageCount = 0;
            document.getElementById('messagesReceived').textContent = '0';
        }

        function startConnectionTimer() {
            connectionTimer = setInterval(() => {
                if (connectionStartTime) {
                    const elapsed = Math.floor((Date.now() - connectionStartTime) / 1000);
                    const minutes = Math.floor(elapsed / 60);
                    const seconds = elapsed % 60;
                    document.getElementById('connectionTime').textContent = 
                        `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
                }
            }, 1000);
        }

        function stopConnectionTimer() {
            if (connectionTimer) {
                clearInterval(connectionTimer);
                connectionTimer = null;
            }
            document.getElementById('connectionTime').textContent = '00:00';
        }

        function playNotificationSound() {
            // Create a simple beep sound
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            oscillator.frequency.value = 800;
            oscillator.type = 'sine';

            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);

            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.1);
        }

        // Auto-fill token from localStorage if available
        window.onload = () => {
            const savedToken = localStorage.getItem('jwt_token');
            if (savedToken) {
                document.getElementById('tokenInput').value = savedToken;
            }
        };

        // Save token to localStorage when connecting
        document.getElementById('tokenInput').addEventListener('change', (e) => {
            localStorage.setItem('jwt_token', e.target.value);
        });
    </script>
</body>
</html>
